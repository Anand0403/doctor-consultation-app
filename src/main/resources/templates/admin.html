<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            Home

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-5">

        <h1 class="page-title">
            Admin Panel
        </h1>

        <a href="/add-doctor"
           class="btn btn-success">

            Add Doctor

        </a>

    </div>

    <div id="doctorList" class="row"></div>

</div>

<script th:src="@{/js/app.js}"></script>

<script>

    async function loadDoctorsAdmin() {

        const response =
            await fetch(
                "/doctors"
            );

        const doctors =
            await response.json();

        const doctorList =
            document.getElementById("doctorList");

        doctorList.innerHTML = "";

        doctors.forEach(doctor => {

            doctorList.innerHTML += `

            <div class="col-md-4 mb-4">

                <div class="card p-3 card-shadow">

                    <h4>${doctor.name}</h4>

                    <p>
                        <strong>Specialization:</strong>
                        ${doctor.specialization}
                    </p>

                    <p>
                        <strong>Experience:</strong>
                        ${doctor.experience} years
                    </p>

                    <p>
                        <strong>Fee:</strong>
                        ₹${doctor.fee}
                    </p>

                    <input
                        type="datetime-local"
                        id="slotTime-${doctor.id}"
                        class="form-control mb-2"
                    >

                    <button
                        class="btn btn-warning mb-2"
                        onclick="addSlot(${doctor.id})">

                        Add Slot

                    </button>

                    <a
                        href="/edit-doctor?id=${doctor.id}"
                        class="btn btn-primary mb-2">

                        Edit

                    </a>

                    <button
                        class="btn btn-danger"
                        onclick="deleteDoctor(${doctor.id})">

                        Delete

                    </button>

                </div>

            </div>
            `;
        });
    }

    async function addSlot(doctorId) {

        const slotTime =
            document.getElementById(
                `slotTime-${doctorId}`
            ).value;

        if (!slotTime) {

            alert("Please select slot time");

            return;
        }

        const response = await fetch(
            `http://localhost:8080/slots/${doctorId}`,
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    slotTime: slotTime
                })
            }
        );

        if (response.ok) {

            alert("Slot added!");

        } else {

            alert("Failed to add slot");
        }
    }

    async function deleteDoctor(id) {

        const confirmDelete =
            confirm("Delete this doctor?");

        if (!confirmDelete) return;

        const response = await fetch(
            `/doctors/${id}`,
            {
                method: "DELETE"
            }
        );

        if (response.ok) {

            alert("Doctor deleted!");

            loadDoctorsAdmin();

        } else {

            alert("Delete failed");
        }
    }

    loadDoctorsAdmin();

</script>

</body>

</html>
